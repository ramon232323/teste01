<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .quiz-container {
      background: #2a2a40;
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .option {
      display: block;
      background: #444;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: #666;
    }

    .correct {
      background: green !important;
    }

    .wrong {
      background: red !important;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c896;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #00a87a;
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question">Pergunta aqui</h2>
  <div id="options"></div>
  <button onclick="nextQuestion()">Próxima</button>
</div>

<script>
const quiz = [
  {
    question: "Qual linguagem você está usando?",
    options: ["Python", "Java", "C++", "HTML"],
    answer: 0
  },
  {
    question: "Quem criou o Python?",
    options: ["Elon Musk", "Guido van Rossum", "Bill Gates", "Mark Zuckerberg"],
    answer: 1
  }
];

let current = 0;

function loadQuestion() {
  const q = quiz[current];
  document.getElementById("question").innerText = q.question;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, index) => {
    const btn = document.createElement("div");
    btn.classList.add("option");
    btn.innerText = opt;

    btn.onclick = () => selectOption(btn, index);

    optionsDiv.appendChild(btn);
  });
}

function selectOption(element, index) {
  const correct = quiz[current].answer;
  const options = document.querySelectorAll(".option");

  options.forEach(opt => opt.onclick = null);

  if(index === correct) {
    element.classList.add("correct");
  } else {
    element.classList.add("wrong");
    options[correct].classList.add("correct");
  }
}

function nextQuestion() {
  current++;
  if(current >= quiz.length) {
    document.querySelector(".quiz-container").innerHTML = "<h2>Fim do Quiz 😎</h2>";
    return;
  }
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
